<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoReader Test - Infinite Scroll</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        line-height: 1.6;
        padding: 24px;
      }
      .wrap {
        max-width: 760px;
      }
      #feed {
        height: 70vh;
        overflow-y: auto;
        border: 1px solid #e6e6e6;
        border-radius: 14px;
        padding: 14px;
        background: #fafafa;
      }
      .item {
        background: #fff;
        border: 1px solid #eee;
        border-radius: 12px;
        padding: 14px 16px;
        margin: 12px 0;
      }
      .hint {
        color: #555;
        background: #f5f5f5;
        border: 1px solid #e7e7e7;
        padding: 12px 14px;
        border-radius: 10px;
      }
      #sentinel {
        height: 2px;
      }
      .loading {
        opacity: 0.85;
        font-style: italic;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Infinite Scroll Page</h1>
      <div class="hint">
        这个页面会在滚动接近底部时自动追加内容。插件应该能持续下滑直到你停止/到达“确定不再增长”的状态。
      </div>
      <div id="feed">
        <div id="items"></div>
        <div id="loading" class="loading" style="display:none;">Loading…</div>
        <div id="sentinel"></div>
      </div>
    </div>

    <script>
      const items = document.getElementById('items');
      const loadingEl = document.getElementById('loading');
      const feed = document.getElementById('feed');
      const sentinel = document.getElementById('sentinel');

      let page = 1;
      let loading = false;

      function addItems(count) {
        for (let i = 0; i < count; i++) {
          const idx = (page - 1) * count + i + 1;
          const el = document.createElement('div');
          el.className = 'item';
          el.innerHTML = `<b>Feed item ${idx}</b><div>用于测试无限滚动场景。</div>`;
          items.appendChild(el);
        }
      }

      addItems(25);

      function setLoading(v) {
        loading = v;
        loadingEl.style.display = v ? 'block' : 'none';
      }

      const observer = new IntersectionObserver(
        (entries) => {
          const entry = entries[0];
          if (!entry || !entry.isIntersecting) return;
          if (loading) return;

          setLoading(true);
          // Simulate network delay.
          const delay = 800 + Math.random() * 600;
          setTimeout(() => {
            page += 1;
            addItems(25);
            setLoading(false);
          }, delay);
        },
        { root: feed, threshold: 1.0 }
      );

      observer.observe(sentinel);
    </script>
  </body>
</html>
